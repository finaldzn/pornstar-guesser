name: Build data + deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh the Wikidata pool weekly, Mondays 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: write   # commit refreshed candidates.json on main only
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build candidates.json from Wikidata + Wikipedia (+ optional Google KG)
        env:
          # Optional. If you set repo Settings -> Secrets -> Actions ->
          # GOOGLE_API_KEY (with Knowledge Graph Search API enabled in the
          # corresponding Google Cloud project), Stage 6 will enrich the
          # pool with curated names via kgsearch.googleapis.com. Without
          # the secret the stage logs "skipping" and exits cleanly.
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python3 build_candidates.py > candidates.json

      - name: Sanity check
        run: |
          n=$(python3 -c 'import json; print(len(json.load(open("candidates.json"))))')
          echo "Got $n candidates"
          if [ "$n" -lt 50 ]; then
            echo "Pool too small ($n) — refusing to commit; check the SPARQL query."
            exit 1
          fi

      # Upload on every run so feature-branch dispatches still produce
      # a downloadable artifact for inspection — without committing to the
      # branch and creating future merge conflicts.
      - name: Upload candidates.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: candidates
          path: candidates.json
          retention-days: 14

      # Commit only on main. Feature branches are intentionally never given
      # a candidates.json bot commit — that's what created the divergent-
      # blob merge conflict pattern we kept hitting.
      - name: Commit refreshed candidates.json (main only, if changed)
        id: commit
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "$(git status --porcelain candidates.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add candidates.json
            git commit -m "Refresh candidates.json from Wikidata [skip ci]"
            git push
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "changed=true"               >> "$GITHUB_OUTPUT"
          else
            echo "candidates.json unchanged"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "changed=false"        >> "$GITHUB_OUTPUT"
          fi

  deploy:
    # Only deploy from main. Feature branches still build + sanity-check
    # candidates.json (uploaded as artifact above) but never publish.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (post-commit SHA so candidates.json is included)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.sha }}

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
