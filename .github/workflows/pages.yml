name: Build data + deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh the Wikidata pool weekly, Mondays 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: write   # commit refreshed candidates.json back to the branch
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build candidates.json from Wikidata
        run: python3 build_candidates.py > candidates.json

      - name: Sanity check
        run: |
          n=$(python3 -c 'import json; print(len(json.load(open("candidates.json"))))')
          echo "Got $n candidates"
          if [ "$n" -lt 50 ]; then
            echo "Pool too small ($n) — refusing to commit; check the SPARQL query."
            exit 1
          fi

      - name: Commit refreshed candidates.json (if changed)
        id: commit
        run: |
          if [ -n "$(git status --porcelain candidates.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add candidates.json
            git commit -m "Refresh candidates.json from Wikidata [skip ci]"
            git push
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "candidates.json unchanged"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    # Only deploy from main. workflow_dispatch on a feature branch will
    # still run the build job above and commit candidates.json back to
    # that branch, but won't touch the Pages deployment.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (post-commit SHA so candidates.json is included)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.sha }}

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
